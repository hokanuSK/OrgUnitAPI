services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
    volumes:
      - ./database/init.sql:/init.sql:ro
    entrypoint: >
      /bin/bash -c
      "/opt/mssql-tools18/bin/sqlcmd -S db -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -d master -i /init.sql"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=CompanyStructureDb;User ID=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};Encrypt=True;TrustServerCertificate=True;"
    ports:
      - "${API_PORT:-18080}:8080"
    restart: unless-stopped

volumes:
  mssql-data:
